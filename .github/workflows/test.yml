# PXC3 — CI for jaxtari + jutari.
#
# Runs the full Python pytest suite for jaxtari and Pkg.test() for
# jutari on every push and pull request. Failures block merging; the
# `@test_broken` row in jutari's PXC1 testset (the documented
# 10-byte conformance gap) stays expected-fail and does NOT fail CI.
#
# The pong_noop_10 PXC2 cross-check + the heavy P8 IG attribution
# suite are slow but run in-process — no GPU needed; JAX falls back
# to the CPU backend on a vanilla GitHub runner.

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  jaxtari:
    runs-on: ubuntu-latest
    # FAST PR/push gate (task #126): the light unit tests only. The HEAVY tests
    # — the P7 soft/differentiable + P8 integrated-gradients suites (~2.75 GB
    # each → N xdist workers OOM-kill the 16 GB runner → job "cancelled") and the
    # slow ROM-booting integration/conformance tests (P6/P6c, breakout, pong,
    # screen) — moved to the scheduled `heavy.yml` workflow (nightly + manual).
    # This keeps PR feedback fast and reliable; full coverage runs nightly.
    # (~10 min locally with single-threaded JAX; give margin for a 4-core runner.)
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install jaxtari + dev deps
        working-directory: jaxtari
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # xdist-parallel (pyproject `-n auto`). Skips: PXC2 (separate job, needs
      # the jutari fixture); the heavy P7/P8 autodiff suites + the slow booting
      # tests (→ heavy.yml). PXC4 (Klaus Dormann) self-skips when its ROM is
      # absent — it is in CI (tools/fixtures/cpu/ is untracked). tests/conftest.py
      # pins JAX single-threaded so even the remaining xdist workers don't
      # oversubscribe; --max-worker-restart recovers any flaky worker death.
      - name: Run pytest — fast unit suite
        working-directory: jaxtari
        run: |
          pytest -q --max-worker-restart=4 \
            --ignore=tests/test_pxc2_jaxtari_vs_jutari.py \
            --ignore-glob='*test_p6*' \
            --ignore-glob='*test_p7*' \
            --ignore-glob='*test_p8*' \
            --ignore-glob='*test_breakout*' \
            --ignore-glob='*test_pong*' \
            --ignore-glob='*test_screen*'

  jutari:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Cache Julia depot
        uses: julia-actions/cache@v2

      - name: Instantiate jutari package
        working-directory: jutari
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run jutari tests
        working-directory: jutari
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  pxc2-cross-check:
    runs-on: ubuntu-latest
    needs: [jaxtari, jutari]      # only meaningful once both ports are green
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Cache Julia depot
        uses: julia-actions/cache@v2

      - name: Install jaxtari + dev deps
        working-directory: jaxtari
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate jutari fixture trace
        # xitari is an external (git-ignored) dependency — its ROMs are
        # not shipped in this repo, so CI cannot regenerate the fixture
        # from a live jutari run. We rely on the committed jutari
        # fixture (`tools/fixtures/traces/pong_noop_10_jutari.jsonl`)
        # as the source of truth and let the PXC2 test cases that
        # *would* need the ROM skip themselves via `_have_fixtures`.
        # When contributors change jutari behaviour they're expected
        # to regen + commit both fixtures locally; PXC2 will then
        # fail the next CI run if those fixtures go out of sync with
        # current jutari output.
        run: |
          if [ ! -f xitari/roms/pong.bin ]; then
            echo "::warning::xitari ROMs not present in CI checkout. Skipping fixture regeneration; PXC2 will run against the committed fixture as-is."
            exit 0
          fi
          julia --project=jutari -e 'using Pkg; Pkg.instantiate()'
          julia --project=jutari tools/jutari_trace_dump.jl \
            --rom xitari/roms/pong.bin \
            --trace tools/fixtures/traces/pong_noop_10.jsonl \
            --out tools/fixtures/traces/pong_noop_10_jutari.jsonl

      - name: Run PXC2 (jaxtari ≡ jutari)
        # Per-case `_have_fixtures` gating in test_pxc2_jaxtari_vs_jutari.py
        # turns every ROM-needing case into a clean pytest skip when no
        # xitari ROMs are present, so this step passes cleanly in CI
        # while still catching breakage when run locally with ROMs.
        working-directory: jaxtari
        run: pytest -q tests/test_pxc2_jaxtari_vs_jutari.py
