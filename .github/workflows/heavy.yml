# Heavy jaxtari suite — scheduled (nightly) + manual.
#
# Split out of the fast PR gate (`test.yml`) because the JAX-autodiff P7/P8
# suites and the slow ROM-booting integration/conformance tests do not fit a
# 16 GB / 2-core GitHub-hosted runner as ONE job: each autodiff worker's JAX
# RSS grows across tests and, summed under xdist, OOM-kills the runner mid-run
# ("The runner has received a shutdown signal" at ~75 min, well under the
# timeout — confirmed nightly 2026-06-20..22).
#
# Fix: a job MATRIX. Each group runs on its OWN fresh 16 GB runner over a
# BOUNDED subset, so per-process JAX accumulation cannot sum past 16 GB; the
# autodiff/IG groups cap xdist (`-n 1`/`-n 2`) to hold the peak down.
# `fail-fast: false` so one group's result never cancels the others, and a
# failure points at a specific group instead of the whole monolith.
# `tests/conftest.py` still pins JAX/XLA/BLAS single-threaded.
#
# The union of the matrix globs equals the old single command
# (test_p6* + test_p7* + test_p8* + test_breakout* + test_pong* + test_screen*).

name: tests (heavy)

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch: {}    # allow manual runs

jobs:
  heavy:
    name: heavy (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          # JAX autodiff (memory-heavy). Bounded subsets + low xdist so a
          # worker's growing RSS can't sum past 16 GB.
          - group: p7-soft
            args: "-n 2 tests/test_p7b.py tests/test_p7c_*.py tests/test_p7d.py"
          - group: p7-func          # heavier per-test RSS than p7-soft → serial
            args: "-n 1 tests/test_p7f_*.py"
          - group: p8-attrib          # integrated-gradients — the heaviest; serial
            args: "-n 1 tests/test_p8_*.py"
          # Slow ROM-booting integration / conformance (light memory, just slow).
          - group: boot
            args: "-n 2 tests/test_p6*.py tests/test_breakout*.py tests/test_pong*.py"
          - group: screen
            args: "-n 2 tests/test_screen*.py"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install jaxtari + dev deps
        working-directory: jaxtari
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # `--max-worker-restart` recovers a flaky worker death; the `-n` in args
      # overrides the `-n auto` from pyproject addopts. conftest pins threads.
      - name: Run pytest — heavy ${{ matrix.group }}
        working-directory: jaxtari
        run: pytest -q --max-worker-restart=4 ${{ matrix.args }}
